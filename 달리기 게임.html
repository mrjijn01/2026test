<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모두의 장애물 달리기 게임</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght=400;700&display=swap');
        body {
            font-family: 'Gaegu', 'Nanum Gothic', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        /* 고대비 모드 정의 */
        .high-contrast {
            background-color: #000000 !important;
            color: #FFFF00 !important;
        }
        .high-contrast .btn-contrast-jump {
            background-color: #00FFFF !important;
            color: #000000 !important;
            border: 4px solid #00FFFF !important;
        }
        .high-contrast .panel {
            background-color: #111111 !important;
            border: 3px solid #FFFF00 !important;
            color: #FFFF00 !important;
        }
        /* 버튼 탭 애니메이션 */
        .btn-active:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-emerald-50 to-teal-100 min-h-screen flex flex-col items-center justify-between p-3 transition-colors duration-300">

    <!-- 상단 대시보드 (점수, 거리, 하트 표시) -->
    <header class="w-full max-w-4xl bg-white/80 backdrop-blur-md rounded-2xl shadow-md p-3 flex flex-wrap justify-between items-center gap-3 z-10 transition-colors duration-300 panel">
        <div class="flex items-center gap-2">
            <span class="text-4xl">🏃‍♂️</span>
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-teal-800 transition-colors duration-300">모두의 수직 달리기 학교</h1>
                <p class="text-xs text-gray-500 transition-colors duration-300">화면이 자동으로 흐릅니다! 장애물이 다가오면 뛰어넘으세요!</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 text-sm md:text-base">
            <div class="bg-amber-50 px-3 py-1 rounded-xl border border-amber-200 transition-colors duration-300 panel">
                <span class="text-xs text-amber-700 block">달린 거리</span>
                <span id="distanceDisplay" class="text-xl font-bold text-amber-600">0 m</span>
            </div>
            <div class="bg-rose-50 px-3 py-1 rounded-xl border border-rose-200 transition-colors duration-300 panel">
                <span class="text-xs text-rose-700 block">체력</span>
                <span id="livesDisplay" class="text-xl font-bold text-rose-600">❤️❤️❤️</span>
            </div>
        </div>
    </header>

    <!-- 메인 플레이 캔버스 및 제어판 -->
    <main class="w-full max-w-5xl flex-grow flex flex-col lg:flex-row gap-4 my-3 items-stretch relative">
        
        <!-- 왼쪽: 학습 맞춤 설정 패널 -->
        <aside class="w-full lg:w-72 bg-white/95 rounded-2xl shadow-lg p-4 flex flex-col justify-between transition-colors duration-300 panel">
            <div class="space-y-4">
                <h2 class="text-lg font-bold text-gray-800 border-b pb-1.5 flex items-center gap-2 transition-colors duration-300">
                    <span>⚙️</span> 학습 환경 설정
                </h2>

                <!-- 난이도 설정 -->
                <div class="space-y-1">
                    <label class="block text-xs font-semibold text-gray-700">장애물 내려오는 속도 (자동 흐름 제어)</label>
                    <div class="grid grid-cols-3 gap-1">
                        <button id="diffEasyBtn" onclick="setDifficulty('easy')" class="py-1.5 text-xs rounded-lg border-2 border-teal-500 bg-teal-50 text-teal-800 font-bold transition-all">천천히</button>
                        <button id="diffNormalBtn" onclick="setDifficulty('normal')" class="py-1.5 text-xs rounded-lg border-2 border-gray-200 bg-gray-50 text-gray-600 font-bold transition-all">보통</button>
                        <button id="diffHardBtn" onclick="setDifficulty('hard')" class="py-1.5 text-xs rounded-lg border-2 border-gray-200 bg-gray-50 text-gray-600 font-bold transition-all">빠르게</button>
                    </div>
                </div>

                <!-- 대안 인터페이스 옵션 -->
                <div class="space-y-2 pt-2 border-t">
                    <div class="flex items-center justify-between">
                        <label for="ttsToggle" class="text-xs font-semibold text-gray-700">성공 시 음성 칭찬 듣기</label>
                        <input type="checkbox" id="ttsToggle" checked class="w-4 h-4 accent-teal-600">
                    </div>
                    <div class="flex items-center justify-between">
                        <label for="highContrastToggle" class="text-xs font-semibold text-gray-700">고대비 모드 (노랑/검정)</label>
                        <input type="checkbox" id="highContrastToggle" onchange="toggleHighContrast()" class="w-4 h-4 accent-yellow-500">
                    </div>
                </div>
            </div>

            <div class="space-y-2 mt-4 lg:mt-0">
                <button id="startBtn" onclick="startGame()" class="w-full bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 text-white font-bold py-2.5 px-4 rounded-xl shadow-md transform hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center gap-2 text-base btn-primary">
                    <span>🎮</span> 게임 시작하기
                </button>
                <button onclick="resetGame()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-4 rounded-xl text-sm transition-all">
                    초기화
                </button>
            </div>
        </aside>

        <!-- 오른쪽: 런닝 트랙 캔버스 & 하단 터치 전용 자이언트 버튼 -->
        <section class="flex-grow flex flex-col gap-3 min-h-[380px]">
            
            <!-- 게임 스크린 영역 -->
            <div class="flex-grow bg-slate-900 rounded-2xl shadow-2xl relative overflow-hidden border-4 border-white/90 min-h-[220px]">
                
                <!-- 시작 / 리셋 오버레이 -->
                <div id="gameOverlay" class="absolute inset-0 bg-slate-950/85 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center z-20 transition-all duration-300">
                    <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 panel">
                        <span id="overlayEmoji" class="text-5xl block animate-bounce">🏃‍♂️</span>
                        <h3 id="overlayTitle" class="text-xl font-bold text-teal-800">모두의 수직 달리기</h3>
                        <p id="overlayDesc" class="text-gray-600 text-sm">화면이 위에서 아래로 자동으로 흐릅니다! 장애물이 다가오면 타이밍에 맞춰 아래의 거대한 파란색 [뛰어넘기] 버튼을 눌러 점프하세요.</p>
                        <button onclick="startGame()" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 px-6 rounded-xl text-md shadow-lg btn-primary">
                            지금 출발하기 🚀
                        </button>
                    </div>
                </div>

                <canvas id="gameCanvas" class="w-full h-full block touch-none" style="touch-action: none;"></canvas>
            </div>

            <!-- 하단 터치 대안 전용 초거대 단일 물리 제어판 (아무 곳이나 터치해도 점프) -->
            <div class="h-28 md:h-36 min-h-[100px]">
                <!-- 점프 버튼 (전체 넓이 통합) -->
                <button id="jumpBtn" onpointerdown="triggerJump(event)" class="btn-active bg-sky-500 hover:bg-sky-600 text-white rounded-3xl shadow-xl flex flex-col items-center justify-center gap-1 transition-all select-none btn-contrast-jump active:bg-sky-700">
                    <span class="text-4xl md:text-5xl pointer-events-none">🚀</span>
                    <span class="text-lg md:text-2xl font-bold pointer-events-none">여기를 가볍게 터치해서 뛰어넘기 (JUMP)</span>
                </button>
            </div>
        </section>
    </main>

    <!-- 가이드 푸터 -->
    <footer class="w-full max-w-4xl text-center text-[11px] text-gray-500 py-1 transition-colors duration-300">
        <p>※ 컴퓨터 키보드의 <b>[스페이스바]</b>, <b>[위 방향키]</b>, <b>[오른쪽 방향키]</b> 중 아무 키나 눌러도 뛰어넘을 수 있습니다.</p>
    </footer>

    <!-- 게임 구동 핵심 스크립트 -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const distanceDisplay = document.getElementById('distanceDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const gameOverlay = document.getElementById('gameOverlay');
        const overlayEmoji = document.getElementById('overlayEmoji');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayDesc = document.getElementById('overlayDesc');
        const ttsToggle = document.getElementById('ttsToggle');
        const contrastToggle = document.getElementById('highContrastToggle');

        // 상태값 정의
        let isPlaying = false;
        let distance = 0;
        let lives = 3;
        let animationFrameId = null;

        // 물리 제어 상수 및 자동 스크롤 전용 변수
        let runSpeed = 0;             // 현재 전진 속도 (자동 회복됨)
        const baseSpeed = 4.5;        // 자동 스크롤 기준 속도
        const speedDecay = 0.95;      // 충돌 넉백 시의 감쇠/회복 보정용 계수
        let obstacleSpeedFactor = 1;  // 난이도별 가중치

        // 엔티티 구조 설계
        let player = null;
        let obstacles = [];
        let particles = [];
        let backgroundScroll = 0;

        // 오디오 컨텍스트
        let audioCtx = null;

        // 칭찬 오디오 보강용 텍스트 풀
        const successSpeech = [
            "진짜 멋졌어요!",
            "점프 완료!",
            "대단해!",
            "나이스 점프!",
            "좋았어!"
        ];

        // 오디오 시스템 초기화
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 1. 달리기 발걸음 사운드
        function playStepSound() {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.09);
        }

        // 2. 뛰어넘기 사운드
        function playJumpSound() {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(550, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.26);
        }

        // 3. 충돌 사운드
        function playCrashSound() {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.45);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.46);
        }

        // 4. 골인/종료 사운드
        function playEndSound(win) {
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const freqs = win ? [523.25, 659.25, 783.99, 1046.50] : [220, 196, 174, 146];
            freqs.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + idx * 0.12);
                gain.gain.setValueAtTime(0.12, now + idx * 0.12);
                gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.12 + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + idx * 0.12);
                osc.stop(now + idx * 0.12 + 0.45);
            });
        }

        // 5. 음성 칭찬 TTS
        function speakSpeech(text) {
            if (!ttsToggle.checked) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.0;
            utterance.pitch = 1.3;
            window.speechSynthesis.speak(utterance);
        }

        // 설정 함수들
        function setDifficulty(level) {
            const btns = ['diffEasyBtn', 'diffNormalBtn', 'diffHardBtn'];
            btns.forEach(id => document.getElementById(id).className = 'py-1.5 text-xs rounded-lg border-2 border-gray-200 bg-gray-50 text-gray-600 font-bold transition-all');
            
            if (level === 'easy') {
                obstacleSpeedFactor = 0.6;
                document.getElementById('diffEasyBtn').className = 'py-1.5 text-xs rounded-lg border-2 border-teal-500 bg-teal-50 text-teal-800 font-bold transition-all';
            } else if (level === 'normal') {
                obstacleSpeedFactor = 1.0;
                document.getElementById('diffNormalBtn').className = 'py-1.5 text-xs rounded-lg border-2 border-teal-500 bg-teal-50 text-teal-800 font-bold transition-all';
            } else {
                obstacleSpeedFactor = 1.4;
                document.getElementById('diffHardBtn').className = 'py-1.5 text-xs rounded-lg border-2 border-teal-500 bg-teal-50 text-teal-800 font-bold transition-all';
            }
        }

        function toggleHighContrast() {
            const isContrast = contrastToggle.checked;
            if (isContrast) {
                document.body.classList.add('high-contrast');
                document.querySelectorAll('.panel').forEach(el => el.classList.add('high-contrast'));
            } else {
                document.body.classList.remove('high-contrast');
                document.querySelectorAll('.panel').forEach(el => el.classList.remove('high-contrast'));
            }
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 플레이어 캐릭터 클래스 (미래형 네온 사이버 러너 탑다운 백터 렌더링 구현)
        class Player {
            constructor() {
                this.x = canvas.width / 2;    // 가로축 중앙 고정
                this.y = canvas.height - 130;  // 하단 안전 영역 배치
                this.width = 75;              // 가시성 극대화 (크기 고정)
                this.height = 75;
                
                // 3D 점프 시뮬레이션용 Z축 고도값
                this.z = 0;              
                this.vz = 0;             
                this.gravity = 0.42;     // 체공 중력
                this.isJumping = false;
                this.jumpStrength = -10.5;
                this.runFrame = 0;
                this.stepSoundTimer = 0;
            }

            jump() {
                if (!this.isJumping) {
                    this.vz = this.jumpStrength;
                    this.isJumping = true;
                    playJumpSound();
                }
            }

            update() {
                this.x = canvas.width / 2; 

                // Z축 물리 방정식 연산
                if (this.isJumping) {
                    this.vz += this.gravity;
                    this.z += this.vz;

                    if (this.z >= 0) {
                        this.z = 0;
                        this.vz = 0;
                        this.isJumping = false;
                    }
                }

                // 부스터 불꽃 미립자 실시간 생성 (고대비 모드가 아닐 때 작동)
                if (isPlaying && runSpeed > 0.5 && !contrastToggle.checked) {
                    this.runFrame += runSpeed * 0.055;
                    
                    // 일정 주기로 발소리 재생
                    this.stepSoundTimer += runSpeed;
                    if (this.stepSoundTimer > 120 && !this.isJumping) {
                        playStepSound();
                        this.stepSoundTimer = 0;
                    }

                    // 제트팩 배출구에서 빛나는 에너지 불꽃 가루 방출
                    if (Math.random() < 0.35) {
                        const jumpScale = 1 + (-this.z / 130);
                        const drawY = this.y + this.z;
                        // 왼쪽 제트팩 혹은 오른쪽 제트팩에서 미립자 방출
                        const jetX = this.x + (Math.random() > 0.5 ? -21 : 21) * jumpScale;
                        const jetY = drawY + 12 * jumpScale;
                        
                        particles.push(new Particle(jetX, jetY, `hsla(${180 + Math.random() * 40}, 100%, 70%, 0.8)`));
                        particles[particles.length - 1].vx = (Math.random() * 2 - 1);
                        particles[particles.length - 1].vy = 2 + Math.random() * 2; // 뒤쪽으로 유동 흐름
                    }
                } else if (isPlaying && runSpeed > 0.5) {
                    this.runFrame += runSpeed * 0.055;
                }
            }

            draw() {
                ctx.save();
                const isContrast = contrastToggle.checked;
                const jumpScale = 1 + (-this.z / 130); // 점프 시 시각적 크기 확대 비율
                const drawY = this.y + this.z;

                // 고대비 모드가 아닐 때 환상적인 그래픽 효과 추가
                if (!isContrast) {
                    // 1. Z축 기반 동적 그림자 연출
                    const shadowScale = Math.max(0.3, 1 + this.z / 150);
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y + 12, this.width * 0.45 * shadowScale, this.height * 0.2 * shadowScale, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fill();

                    // 2. 붉은색 네온 사이버 망토 (Waving Cyber Cape)
                    ctx.beginPath();
                    ctx.moveTo(this.x - 14 * jumpScale, drawY);
                    const wave = Math.sin(this.runFrame * 1.8) * 12 * jumpScale;
                    ctx.bezierCurveTo(
                        this.x - 24 * jumpScale + wave, drawY + 20 * jumpScale,
                        this.x - 12 * jumpScale - wave, drawY + 45 * jumpScale,
                        this.x + wave * 0.5, drawY + 68 * jumpScale // 망토 자락 끝부분
                    );
                    ctx.bezierCurveTo(
                        this.x + 12 * jumpScale - wave, drawY + 45 * jumpScale,
                        this.x + 24 * jumpScale + wave, drawY + 20 * jumpScale,
                        this.x + 14 * jumpScale, drawY
                    );
                    
                    // 망토 가열 네온 그라데이션 적용
                    const capeGrad = ctx.createLinearGradient(this.x, drawY, this.x, drawY + 68 * jumpScale);
                    capeGrad.addColorStop(0, '#EF4444');
                    capeGrad.addColorStop(0.6, '#F43F5E');
                    capeGrad.addColorStop(1, 'rgba(244, 63, 94, 0)');
                    ctx.fillStyle = capeGrad;
                    ctx.shadowColor = '#F43F5E';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.shadowBlur = 0; // 초기화

                    // 3. 트윈 부스터 노즐 및 상시 가동 화염 에너지
                    ctx.fillStyle = '#475569'; // 메탈 하우징
                    ctx.fillRect(this.x - 24 * jumpScale, drawY + 2 * jumpScale, 6 * jumpScale, 10 * jumpScale);
                    ctx.fillRect(this.x + 18 * jumpScale, drawY + 2 * jumpScale, 6 * jumpScale, 10 * jumpScale);

                    // 제트 기류 불꽃 비주얼 효과
                    const flameLen = (8 + Math.sin(this.runFrame * 3.5) * 6) * jumpScale * (this.isJumping ? 1.8 : 1.0);
                    const flameGrad = ctx.createLinearGradient(0, drawY + 12 * jumpScale, 0, drawY + 12 * jumpScale + flameLen);
                    flameGrad.addColorStop(0, '#22D3EE');
                    flameGrad.addColorStop(0.4, '#0EA5E9');
                    flameGrad.addColorStop(1, 'rgba(14, 165, 233, 0)');
                    ctx.fillStyle = flameGrad;
                    ctx.fillRect(this.x - 23 * jumpScale, drawY + 12 * jumpScale, 4 * jumpScale, flameLen);
                    ctx.fillRect(this.x + 19 * jumpScale, drawY + 12 * jumpScale, 4 * jumpScale, flameLen);
                }

                // 4. 주자 다리 교차 무브먼트
                const leftFootY = drawY + Math.sin(this.runFrame) * 14 * jumpScale;
                const rightFootY = drawY - Math.sin(this.runFrame) * 14 * jumpScale;
                ctx.lineWidth = 4 * jumpScale;
                ctx.lineCap = 'round';
                
                // 왼발 (네온 블루 라인 슈즈)
                ctx.strokeStyle = isContrast ? '#FFFF00' : '#00D8FF';
                ctx.beginPath();
                ctx.moveTo(this.x - 16 * jumpScale, drawY);
                ctx.lineTo(this.x - 16 * jumpScale, leftFootY + (leftFootY > drawY ? 8 : -4) * jumpScale);
                ctx.stroke();

                // 오른발 (네온 블루 라인 슈즈)
                ctx.strokeStyle = isContrast ? '#FFFF00' : '#00D8FF';
                ctx.beginPath();
                ctx.moveTo(this.x + 16 * jumpScale, drawY);
                ctx.lineTo(this.x + 16 * jumpScale, rightFootY + (rightFootY > drawY ? 8 : -4) * jumpScale);
                ctx.stroke();

                // 5. 사이버 장갑 (양팔 스윙)
                const leftHandY = drawY - Math.sin(this.runFrame) * 16 * jumpScale;
                const rightHandY = drawY + Math.sin(this.runFrame) * 16 * jumpScale;
                ctx.fillStyle = isContrast ? '#FFFF00' : '#E2E8F0';
                
                // 왼손
                ctx.beginPath();
                ctx.arc(this.x - 23 * jumpScale, leftHandY, 5.5 * jumpScale, 0, Math.PI * 2);
                ctx.fill();
                if (isContrast) ctx.stroke();

                // 오른손
                ctx.beginPath();
                ctx.arc(this.x + 23 * jumpScale, rightHandY, 5.5 * jumpScale, 0, Math.PI * 2);
                ctx.fill();
                if (isContrast) ctx.stroke();

                // 6. 하이테크 사이버 아머 바디 (메탈릭 다크 섀시 구조)
                ctx.fillStyle = isContrast ? '#000000' : '#1E293B';
                ctx.strokeStyle = isContrast ? '#FFFF00' : '#38BDF8';
                ctx.lineWidth = 3 * jumpScale;
                ctx.beginPath();
                ctx.ellipse(this.x, drawY, (this.width * 0.42) * jumpScale, (this.height * 0.26) * jumpScale, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 7. 가슴 중앙 원형 아크 리액터 (고대비 아닐 때 아크 크리스탈 글로우 연출)
                if (!isContrast) {
                    const corePulse = 5 + Math.sin(this.runFrame * 2) * 2;
                    ctx.beginPath();
                    ctx.arc(this.x, drawY, corePulse * jumpScale, 0, Math.PI * 2);
                    ctx.fillStyle = '#38BDF8';
                    ctx.shadowColor = '#38BDF8';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // 8. 강철 헬멧 플레이트
                ctx.fillStyle = isContrast ? '#000000' : '#64748B';
                ctx.beginPath();
                ctx.arc(this.x, drawY - 2 * jumpScale, (this.width * 0.22) * jumpScale, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 9. 시안 블루 네온 바이저 광선 라인 (눈부심 방지용 고감도 마스크)
                ctx.strokeStyle = isContrast ? '#FFFF00' : '#22D3EE';
                ctx.lineWidth = 4 * jumpScale;
                ctx.beginPath();
                ctx.arc(this.x, drawY - 4 * jumpScale, (this.width * 0.17) * jumpScale, Math.PI * 1.1, Math.PI * 1.9);
                if (!isContrast) {
                    ctx.shadowColor = '#22D3EE';
                    ctx.shadowBlur = 10;
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.restore();
            }
        }

        // 장애물 클래스
        class Obstacle {
            constructor() {
                this.width = 52;
                this.height = 52;
                this.x = canvas.width / 2; // 러닝 레인 정중앙 타격 궤적 정렬
                this.y = -60;              // 탑 다운 수직 낙하 시작
                this.emoji = Math.random() > 0.5 ? '🚧' : '🪵';
                this.passed = false;
            }

            update() {
                // 선수가 전진하는 속도에 맞춰 아래로 쏟아져 내림
                this.y += (runSpeed * obstacleSpeedFactor);
            }

            draw() {
                ctx.save();
                const isContrast = contrastToggle.checked;
                
                const drawX = this.x - this.width / 2;
                const drawY = this.y - this.height / 2;

                if (isContrast) {
                    ctx.fillStyle = '#FFFF00';
                    ctx.fillRect(drawX, drawY, this.width, this.height);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(drawX, drawY, this.width, this.height);
                    
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('X', this.x, this.y);
                } else {
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font = '40px sans-serif';
                    ctx.fillText(this.emoji, this.x, this.y);
                }
                ctx.restore();
            }
        }

        // 파티클 클래스
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1.0;
                this.decay = Math.random() * 0.03 + 0.02;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 뛰어넘기 행동 트리거 (원터치 제어판 전용)
        function triggerJump(e) {
            if (!isPlaying) return;
            if (e) e.preventDefault();
            if (player) {
                player.jump();
            }
        }

        // 물리 키보드 바인딩 (모든 조작 방향키 및 스페이스 통합)
        window.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowRight' || e.code === 'ArrowLeft') {
                e.preventDefault();
                triggerJump();
            }
        });

        // 장애물 스포너 및 물리 충돌 판정 엔진
        let spawnTimer = 0;
        function handleObstacles() {
            spawnTimer++;
            // 속도가 빠를수록 빈도를 가변 조정하여 리듬감 제어
            const spawnInterval = Math.max(90, 160 - runSpeed * 7);
            
            if (spawnTimer > spawnInterval) {
                obstacles.push(new Obstacle());
                spawnTimer = 0;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.update();
                obs.draw();

                // 충돌 감지 가드 영역 설계 (거대화된 크기를 감안하여 물리 오차 보정 - 가시 범주의 85%선만 적용)
                const pBox = { 
                    x: player.x - player.width / 2.5, 
                    y: player.y - player.height / 2.5, 
                    w: player.width * 0.8, 
                    h: player.height * 0.8 
                };
                const oBox = { 
                    x: obs.x - obs.width / 2 + 4, 
                    y: obs.y - obs.height / 2 + 4, 
                    w: obs.width - 8, 
                    h: obs.height - 8 
                };

                const isColliding2D = pBox.x < oBox.x + oBox.w &&
                                     pBox.x + pBox.w > oBox.x &&
                                     pBox.y < oBox.y + oBox.h &&
                                     pBox.y + pBox.h > oBox.y;

                if (isColliding2D) {
                    // [핵심 보편성 설계]: 플레이어가 점프(Z축 고가속) 상황인 경우 충돌 회피 인정
                    if (player.isJumping) {
                        if (!obs.passed && obs.y > player.y) {
                            obs.passed = true;
                            distance += 10;
                            distanceDisplay.textContent = `${distance} m`;
                            
                            const randomSpeech = successSpeech[Math.floor(Math.random() * successSpeech.length)];
                            speakSpeech(randomSpeech);

                            // 명중 축하 무지개 가루 연출
                            for (let p = 0; p < 10; p++) {
                                particles.push(new Particle(player.x, player.y + player.z, `hsl(${Math.random()*360}, 100%, 55%)`));
                            }
                        }
                    } else {
                        // 지면에 착지해있다면 대미지 차감 및 넉백 충격 물리 작동
                        playCrashSound();
                        lives--;
                        updateLivesUI();
                        
                        for (let p = 0; p < 15; p++) {
                            particles.push(new Particle(obs.x, obs.y, '#EF4444'));
                        }
                        
                        obstacles.splice(i, 1);
                        runSpeed = -2.5; // 장애물에 세게 부딪히며 뒤로 미끄러짐

                        if (lives <= 0) {
                            endGame(false);
                        }
                    }
                    continue;
                }

                // 뛰어넘지는 못했으나 장애물이 플레이어 뒤로 평화롭게 흐른 상태
                if (!obs.passed && obs.y > player.y + 45) {
                    obs.passed = true;
                    distance += 10;
                    distanceDisplay.textContent = `${distance} m`;
                    speakSpeech("나이스!");
                }

                // 가비지 컬렉션
                if (obs.y > canvas.height + 60) {
                    obstacles.splice(i, 1);
                }
            }
        }

        function updateLivesUI() {
            let hearts = '';
            for (let i = 0; i < 3; i++) {
                hearts += i < lives ? '❤️' : '🖤';
            }
            livesDisplay.textContent = hearts;
        }

        // --- 메인 물리 및 드로잉 애니메이션 루프 ---
        function gameLoop() {
            if (!isPlaying) return;

            const isContrast = contrastToggle.checked;
            ctx.fillStyle = isContrast ? '#000000' : '#047857'; // 활기찬 잔디구장 그린
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 세로 육상 트랙 구조 설계
            const trackWidth = Math.min(canvas.width * 0.7, 340);
            const trackX = (canvas.width - trackWidth) / 2;

            ctx.fillStyle = isContrast ? '#111111' : '#334155'; // 수직 아스팔트 로드
            ctx.fillRect(trackX, 0, trackWidth, canvas.height);

            // 사이드 안전선 도색
            ctx.fillStyle = isContrast ? '#FFFF00' : '#FFFFFF';
            ctx.fillRect(trackX - 4, 0, 4, canvas.height);
            ctx.fillRect(trackX + trackWidth, 0, 4, canvas.height);

            // 배경 도로 가이드선 무한 롤링 다운 (달리기 입체감 부가 기술)
            if (!isContrast) {
                backgroundScroll += runSpeed * 0.6;
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.38)';
                ctx.lineWidth = 4;
                ctx.setLineDash([30, 30]);
                ctx.lineDashOffset = -backgroundScroll;
                
                // 2분할 가이드 중앙 차로
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.restore();
            }

            // 2. 플레이어 캐릭터 물리 가습 및 드로잉
            if (player) {
                player.update();
                player.draw();
            }

            // 3. 장애물 처리기 작동
            handleObstacles();

            // 4. 비주얼 파티클 렌더링
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // [자동 스크롤 마찰 제어식]: 충돌 시 뒤로 밀렸다가 점진적으로 목표 자동 스피드로 등가속 회복
            const targetSpeed = baseSpeed * obstacleSpeedFactor;
            if (runSpeed < targetSpeed) {
                runSpeed += 0.14; 
                if (runSpeed > targetSpeed) runSpeed = targetSpeed;
            } else if (runSpeed > targetSpeed) {
                runSpeed *= speedDecay;
                if (runSpeed < targetSpeed) runSpeed = targetSpeed;
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // --- 게임 수명 주기 핸들러 ---
        function startGame() {
            initAudio();
            gameOverlay.classList.add('hidden');
            isPlaying = true;
            lives = 3;
            distance = 0;
            runSpeed = baseSpeed * obstacleSpeedFactor; // 첫 시작 시 가만히 있어도 자동 전진 속도로 스타트
            obstacles = [];
            particles = [];
            distanceDisplay.textContent = "0 m";
            updateLivesUI();

            player = new Player();
            resizeCanvas();

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            gameLoop();
        }

        function endGame(win) {
            isPlaying = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            playEndSound(win);

            overlayEmoji.textContent = '🏆';
            overlayTitle.textContent = '완주 완료! 참 잘했어요!';
            overlayDesc.innerHTML = `오늘 기록한 대단한 점수는 <strong class="text-teal-600 text-2xl block mt-1">${distance} m</strong> 입니다. 더 멀리 달려볼까요?`;
            gameOverlay.classList.remove('hidden');
        }

        function resetGame() {
            isPlaying = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            lives = 3;
            distance = 0;
            runSpeed = 0;
            obstacles = [];
            particles = [];
            distanceDisplay.textContent = "0 m";
            updateLivesUI();

            overlayEmoji.textContent = '🏃‍♂️';
            overlayTitle.textContent = '모두의 수직 달리기';
            overlayDesc.textContent = "준비가 되었으면 아래의 출발하기 버튼을 눌러보세요!";
            gameOverlay.classList.remove('hidden');

            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
